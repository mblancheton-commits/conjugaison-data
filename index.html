<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF Pro</title>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics-compat.js"></script>

    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; --warning: #f39c12; --gold: #f1c40f; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--dark); }
        .app-container { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; min-height: 550px; display: flex; flex-direction: column; margin: 20px 0; position: relative; }
        
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .step { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-choice { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; box-shadow: 0 4px 0 #eee; text-align: center; }
        .btn-choice:active { transform: translateY(2px); box-shadow: 0 2px 0 #eee; }
        .btn-choice.selected { background: var(--primary); color: white; border-color: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        
        /* Hiérarchie Visuelle */
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; position: relative; }
        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #verb-traduction { font-size: 0.9rem; color: #7f8c8d; display: block; margin-bottom: 5px; font-style: italic; }
        #tense-display { font-size: 1.4rem; font-weight: bold; color: var(--warning); margin: 10px 0; display: block; border-top: 1px solid #d0e7ff; padding-top: 10px; }
        #pronoun { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: var(--dark); }
        
        #game-timer { font-size: 1.8rem; font-weight: bold; color: var(--error); text-align: center; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; text-align: center; outline: none; }
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 0 #ccc; }
        
        /* Leaderboard UI */
        .filter-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-group select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        .leaderboard-table th { background: var(--primary); color: white; padding: 10px; text-align: left; }
        .leaderboard-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .review-block { background: #fff; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 25px; padding: 15px; }
        .review-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .review-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .error-row { background: #fff0f0; color: var(--error); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="main-title">Conju-Coach ✍️</h1>

    <!-- 0. LANGUE -->
    <div id="step-lang" class="step active">
        <p style="text-align:center; font-weight:bold;">Choisissez votre langue<br>언어를 선택하세요</p>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.setLang('fr')">Français 🇫🇷</button>
            <button class="btn-choice" onclick="window.setLang('ko')">한국어 🇰🇷</button>
        </div>
    </div>

    <!-- 1. MENU PRINCIPAL -->
    <div id="step-main-menu" class="step">
        <button class="btn-full" style="background:var(--primary)" onclick="window.goToStep('step-level')">🎯 <span id="menu-classic">Entraînement</span></button>
        <button class="btn-full" style="background:var(--warning)" onclick="window.goToStep('step-challenges')">🔥 <span id="menu-challenge">Challenges</span></button>
        <button class="btn-full" style="background:#34495e" onclick="window.goToStep('step-conj')">📖 <span id="menu-conj">Conjugueur</span></button>
        <button class="btn-full" style="background:var(--secondary)" onclick="window.loadLeaderboard()">🏆 <span id="menu-lb">Classement</span></button>
    </div>

    <!-- 2. CHOIX NIVEAU -->
    <div id="step-level" class="step">
        <h2 id="label-level" style="text-align:center; margin:0;">-</h2>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.selectLevel('A1')">A1</button>
            <button class="btn-choice" onclick="window.selectLevel('A2')">A2</button>
            <button class="btn-choice" onclick="window.selectLevel('B1')">B1</button>
            <button class="btn-choice" onclick="window.selectLevel('B2')">B2</button>
        </div>
        <button id="btn-custom-trigger" class="btn-choice" style="width:100%; margin-top:10px;" onclick="window.goToStep('step-custom')">-</button>
        <button class="btn-full" style="background:#95a5a6" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 3. CHALLENGES -->
    <div id="step-challenges" class="step">
        <h2 style="text-align:center; margin:0;">🔥 Modes de Jeu</h2>
        <div class="btn-grid">
            <button id="btn-mode-sd" class="btn-choice challenge-btn" onclick="window.selectChallengeMode('sudden-death', this)">☠️ <span id="txt-sd">Mort Subite</span></button>
            <button id="btn-mode-ta" class="btn-choice challenge-btn" onclick="window.selectChallengeMode('time-attack', this)">⏱️ <span id="txt-ta">Time Attack</span></button>
        </div>
        <button id="btn-mode-ta-weighted" class="btn-choice challenge-btn" style="width:100%; margin-top:10px;" onclick="window.selectChallengeMode('time-attack-weighted', this)">🌟 <span id="txt-ta-all">Time Attack (Tous verbes)</span></button>
        
        <div id="challenge-level-select" style="display:none; margin-top:15px; border-top:2px dashed #ddd; padding-top:15px;">
            <p id="label-challenge-lvl" style="text-align:center; font-weight:bold;">Niveau :</p>
            <div class="btn-grid">
                <button class="btn-choice" onclick="window.startChallengeGame('A1')">A1</button>
                <button class="btn-choice" onclick="window.startChallengeGame('A2')">A2</button>
                <button class="btn-choice" onclick="window.startChallengeGame('B1')">B1</button>
                <button class="btn-choice" onclick="window.startChallengeGame('B2')">B2</button>
            </div>
        </div>
        <button class="btn-full" style="background:#95a5a6; margin-top:10px;" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 4. LEADERBOARD -->
    <div id="step-leaderboard" class="step">
        <h2 style="text-align:center; margin:0;">🏆 Top 10</h2>
        <div class="filter-group">
            <select id="lb-time" onchange="window.updateLeaderboardView()">
                <option value="week">Semaine</option>
                <option value="month">Mois</option>
                <option value="all">Toujours</option>
            </select>
            <select id="lb-mode" onchange="window.updateLeaderboardView()">
                <option value="sudden-death">Mort Subite ☠️</option>
                <option value="time-attack">Time Attack ⏱️</option>
                <option value="time-attack-weighted">TA (Global) 🌟</option>
            </select>
        </div>
        <select id="lb-level" onchange="window.updateLeaderboardView()" style="width:100%; padding:10px; border-radius:8px; margin-bottom:10px;">
            <option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option>
        </select>
        <div id="leaderboard-content" style="min-height: 200px;"></div>
        <button class="btn-full" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 5. JEU -->
    <div id="step-game" class="step">
        <div id="game-progress" style="text-align: right; font-weight: bold; color: var(--primary);">0</div>
        <div id="game-timer" style="display:none; text-align:center; font-size:1.5rem; font-weight:bold; color:var(--error);">⏳ 01:00</div>
        <div class="verb-card">
            <div id="verb-name">---</div>
            <span id="verb-traduction"></span>
            <span id="tense-display">-</span>
            <div id="pronoun">---</div>
            <input type="text" id="answer-input" autocomplete="off" spellcheck="false">
            <div class="keyboard">
                <button class="key" onclick="window.insertChar('é')">é</button>
                <button class="key" onclick="window.insertChar('è')">è</button>
                <button class="key" onclick="window.insertChar('à')">à</button>
                <button class="key" onclick="window.insertChar('ç')">ç</button>
                <button class="key" onclick="window.insertChar('ê')">ê</button>
                <button class="key" onclick="window.insertChar('î')">î</button>
            </div>
        </div>
        <button id="btn-submit" class="btn-full" onclick="window.checkAnswer()">Vérifier</button>
        <button id="btn-stop-infinite" class="btn-full" style="background:#95a5a6; display:none;" onclick="window.showResults()">Terminer</button>
        <div id="feedback" style="text-align:center; font-weight:bold; min-height:40px; margin-top:10px;"></div>
    </div>

    <!-- 6. RÉSULTATS -->
    <div id="step-results" class="step">
        <div class="results-header" style="text-align:center;">
            <div class="score-big" id="final-score">0</div>
            <p id="final-percent" style="font-weight:bold">-</p>
        </div>
        <div id="save-score-section" style="background:#fff9c4; padding:15px; border-radius:12px; border:1px solid #fbc02d; text-align:center; margin-bottom:15px;">
            <p id="label-pseudo" style="margin-bottom:10px; font-weight:bold"></p>
            <input type="text" id="user-pseudo" maxlength="12" placeholder="Pseudo">
            <button id="btn-save-score" class="btn-full" style="background:#fbc02d; color:#000;" onclick="window.saveScore()">🏆 Enregistrer mon score</button>
        </div>
        <div id="results-leaderboard" style="display:none; margin: 15px 0;">
            <h3 id="label-top10" style="text-align:center;">🏆 Top 10 Actuel</h3>
            <div id="mini-leaderboard-content"></div>
        </div>
        <div id="mistake-container"></div>
        <button class="btn-full" onclick="location.reload()">Recommencer</button>
    </div>

    <!-- CONJUGUEUR & CUSTOM (omises ici mais présentes dans le script) -->
    <div id="step-conj" class="step">
        <p id="label-search" style="text-align:center"></p>
        <input type="text" id="search-input" oninput="window.updateSuggestions()" autocomplete="off">
        <div id="suggestions" style="background:white; border:1px solid #ddd; display:none; max-height:100px; overflow:auto;"></div>
        <div id="conj-results" style="margin-top:20px; overflow-y: auto; max-height: 350px;"></div>
        <button class="btn-full" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>
    <div id="step-custom" class="step">
        <p id="label-tenses" style="text-align:center">-</p>
        <div class="btn-grid" id="tense-buttons"></div>
        <button id="btn-custom-next" class="btn-full" onclick="window.goToStep('step-quantity')">Suivant ➔</button>
        <button class="btn-full" style="background:#95a5a6" onclick="window.goToStep('step-level')">➔ Retour</button>
    </div>
    <div id="step-quantity" class="step">
        <p id="label-quantity" style="text-align:center">-</p>
        <input type="number" id="nb-verbes" value="10">
        <button id="btn-infinite" class="btn-choice" style="width:100%; margin-top:10px;"></button>
        <button id="btn-start" class="btn-full" onclick="window.startClassic()">Commencer !</button>
    </div>
</div>

<script>

    // --- NAVIGATION ---
    window.setLang = function(l) {

        ["menu-classic", "menu-challenge", "menu-conj", "menu-lb", "label-level", "btn-custom-trigger", "label-search", "label-quantity", "btn-infinite", "btn-start", "btn-submit", "btn-stop-infinite", "label-pseudo", "txt-sd", "txt-ta", "txt-ta-all"].forEach(id => {
