<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--dark); }
        .app-container { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; min-height: 550px; display: flex; flex-direction: column; margin: 20px 0; }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .step { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-choice { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; box-shadow: 0 4px 0 #eee; text-align: center; }
        .btn-choice:active { transform: translateY(2px); box-shadow: 0 2px 0 #eee; }
        .btn-choice.selected { background: var(--primary); color: white; border-color: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transform: translateY(2px); }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        
        .search-container { position: relative; width: 100%; }
        .suggestion-list { background: white; border: 1px solid #ddd; border-radius: 10px; max-height: 150px; overflow-y: auto; margin-top: 5px; display: none; z-index: 10; }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; }
        .suggestion-item:hover { background: #f0f7ff; }

        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; }
        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #verb-traduction { font-size: 1.1rem; color: var(--dark); display: block; margin-top: 5px; font-weight: normal; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; text-align: center; outline: none; font-family: inherit; }
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 0 #ccc; }
        
        .review-block { background: #fff; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 25px; padding: 15px; }
        .review-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .review-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .error-row { background: #fff0f0; color: var(--error); font-weight: bold; }
        .email-section { background: #f0f9ff; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="main-title">Conju-Coach ✍️</h1>

    <!-- ÉTAPE 0 : Langue -->
    <div id="step-lang" class="step active">
        <p style="text-align:center">Choisissez votre langue / 언어를 선택하세요</p>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.setLang('fr')">Français 🇫🇷</button>
            <button class="btn-choice" onclick="window.setLang('ko')">한국어 🇰🇷</button>
        </div>
    </div>

    <!-- ÉTAPE 1 : Mode -->
    <div id="step-level" class="step">
        <button id="btn-conj" class="btn-full" style="background:var(--primary); margin-bottom: 10px;" onclick="window.goToStep('step-conj')">📖 Conjugueur / 동사 변화표</button>
        <p id="label-level" style="text-align:center">Niveau DELF :</p>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.selectLevel('A1')">A1</button>
            <button class="btn-choice" onclick="window.selectLevel('A2')">A2</button>
            <button class="btn-choice" onclick="window.selectLevel('B1')">B1</button>
            <button class="btn-choice" onclick="window.selectLevel('B2')">B2</button>
        </div>
        <button id="btn-custom-trigger" class="btn-choice" style="width:100%; margin-top:10px;" onclick="window.goToStep('step-custom')">⚙️ Personnalisé</button>
    </div>

    <!-- ÉTAPE CONJUGUEUR -->
    <div id="step-conj" class="step">
        <p id="label-search" style="text-align:center">Rechercher un verbe :</p>
        <div class="search-container">
            <input type="text" id="search-input" oninput="window.updateSuggestions()" autocomplete="off">
            <div id="suggestions" class="suggestion-list"></div>
        </div>
        <div id="conj-results" style="margin-top:20px; overflow-y: auto; max-height: 400px; border-top:1px solid #eee; padding-top:10px;"></div>
        <button class="btn-full" style="background:#95a5a6" onclick="window.goToStep('step-level')">➔ Retour / 뒤로 가기</button>
    </div>

    <!-- ÉTAPE CUSTOM -->
    <div id="step-custom" class="step">
        <p id="label-tenses" style="text-align:center">Quels temps ?</p>
        <div class="btn-grid" id="tense-buttons"></div>
        <button id="btn-custom-next" class="btn-full" onclick="window.confirmCustomTenses()">Suivant ➔</button>
    </div>

    <!-- ÉTAPE QUANTITÉ -->
    <div id="step-quantity" class="step">
        <p id="label-quantity" style="text-align:center">Nombre de verbes :</p>
        <input type="number" id="nb-verbes" value="10" min="1" max="50">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button id="btn-infinite" class="btn-choice" style="flex:1" onclick="window.startChallenge(999)">Infini ∞</button>
            <button id="btn-start" class="btn-full" style="flex:2; margin:0" onclick="window.startChallenge()">Commencer !</button>
        </div>
    </div>

    <!-- ÉTAPE JEU -->
    <div id="step-game" class="step">
        <div id="game-progress" style="text-align: right; font-weight: bold; color: var(--primary);">0 / 10</div>
        <div class="verb-card">
            <div id="verb-name">---</div>
            <span id="verb-traduction"></span>
            <div id="tense-display" style="font-style:italic; color:#666; margin-top: 5px;">-</div>
            <div id="pronoun">---</div>
            <input type="text" id="answer-input" autocomplete="off" spellcheck="false">
            <div class="keyboard">
                <button class="key" onclick="window.insertChar('é')">é</button>
                <button class="key" onclick="window.insertChar('è')">è</button>
                <button class="key" onclick="window.insertChar('à')">à</button>
                <button class="key" onclick="window.insertChar('ç')">ç</button>
                <button class="key" onclick="window.insertChar('ê')">ê</button>
                <button class="key" onclick="window.insertChar('î')">î</button>
            </div>
        </div>
        <button id="btn-submit" class="btn-full" onclick="window.checkAnswer()">Vérifier</button>
        <button id="btn-stop-infinite" class="btn-full" style="background:#95a5a6; display:none;" onclick="window.showResults()">Terminer</button>
        <div id="feedback" style="text-align:center; font-weight:bold; min-height:40px; margin-top:15px;"></div>
    </div>

    <!-- ÉTAPE RÉSULTATS -->
    <div id="step-results" class="step">
        <div class="results-header">
            <div class="score-big" id="final-score">0 / 0</div>
            <p id="final-percent" style="font-weight:bold">0%</p>
        </div>
        <div class="email-section">
            <textarea id="user-comment" rows="2"></textarea>
            <button id="btn-email" class="btn-full" style="background:var(--primary)" onclick="window.sendEmail()">📧 Crâner à Matthieu</button>
        </div>
        <div id="mistake-container"></div>
        <button id="btn-restart" class="btn-full" onclick="location.reload()">Recommencer</button>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    let currentLang = 'fr';
    let fullDatabase = [];
    let currentV, currentTense, currentPIdx;
    let score = 0, total = 0, targetNb = 10;
    let selectedLevel = 'A1';
    let selectedTenses = [];
    let mistakeTracker = [];

    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];
    const levelsOrder = ["A1", "A2", "B1", "B2"];
    const a1Irregulars = ["être", "avoir", "faire", "aller", "prendre", "vouloir", "pouvoir", "devoir"];

    const tenseMap = {
        "Présent": { ko: "현재 (présent)" },
        "Imparfait": { ko: "반과거 (imparfait)" },
        "Passé composé": { ko: "복합과거 (passé composé)" },
        "Plus-que-parfait": { ko: "대과거 (plus-que-parfait)" },
        "Futur simple": { ko: "단순미래 (futur simple)" },
        "Conditionnel présent": { ko: "조건법 / 가정법 (conditionnel)" },
        "Subjonctif présent": { ko: "접속법 현재 (subjonctif présent)" },
        "Impératif présent": { ko: "명령법 현재 (impératif présent)" }
    };

    const i18n = {
        fr: {
            levelLabel: "Choisissez votre niveau DELF :",
            customBtn: "⚙️ Personnalisé",
            searchLabel: "📖 Conjugueur : Rechercher un verbe",
            tensesLabel: "Quels temps voulez-vous réviser ?",
            nextBtn: "Suivant ➔",
            qtyLabel: "Nombre de verbes :",
            infinite: "Infini ∞",
            startBtn: "Commencer !",
            checkBtn: "Vérifier",
            stopBtn: "Terminer et voir les résultats",
            searchPlaceholder: "Tapez un verbe...",
            commentPlaceholder: "Un commentaire ?",
            emailBtn: "📧 Crâner à Matthieu",
            restartBtn: "Recommencer",
            successMsg: "✨ Bravo !",
            errorMsg: "❌ Non :",
            statsLabel: "de réussite",
            reviewTitle: "Tables à réviser :",
            perfectMsg: "Zéro faute ! 🏆",
            errorLabel: " <-- ERREUR"
        },
        ko: {
            levelLabel: "델프 레벨을 선택하세요 :",
            customBtn: "⚙️ 개인 설정",
            searchLabel: "📖 동사 변화표 : 동사 검색",
            tensesLabel: "어떤 시제를 연습하고 싶나요?",
            nextBtn: "다음 ➔",
            qtyLabel: "몇 개의 동사를 연습할까요?",
            infinite: "무한 모드 ∞",
            startBtn: "시작하기!",
            checkBtn: "확인하기",
            stopBtn: "종료하고 결과 보기",
            searchPlaceholder: "동사를 입력하세요...",
            commentPlaceholder: "의견을 남겨주세요...",
            emailBtn: "📧 선생님께 결과 보내기",
            restartBtn: "다시 시작하기",
            successMsg: "✨ 잘했어요!",
            errorMsg: "❌ 정답은 :",
            statsLabel: "성공률",
            reviewTitle: "복습해야 할 표 :",
            perfectMsg: "완벽해요! 최고입니다! 🏆",
            errorLabel: " <-- 내 오답"
        }
    };

    const tenseWeights = {
        "A1": { "Présent": 100 },
        "A2": { "Présent": 20, "Passé composé": 30, "Imparfait": 30, "Conditionnel présent": 20, "Impératif présent": 10 },
        "B1": { "Présent": 10, "Passé composé": 20, "Imparfait": 20, "Futur simple": 10, "Impératif présent": 10, "Conditionnel présent": 10, "Plus-que-parfait": 10, "Subjonctif présent": 10 },
        "B2": { "Présent": 5, "Passé composé": 20, "Imparfait": 10, "Futur simple": 10, "Impératif présent": 5, "Conditionnel présent": 10, "Plus-que-parfait": 10, "Subjonctif présent": 30 }
    };

    // --- 2. FONCTIONS GLOBALES ---

    window.setLang = function(l) {
        currentLang = l;
        const text = i18n[l];
        document.getElementById('label-level').innerText = text.levelLabel;
        document.getElementById('btn-custom-trigger').innerText = text.customBtn;
        document.getElementById('label-search').innerText = text.searchLabel;
        document.getElementById('search-input').placeholder = text.searchPlaceholder;
        document.getElementById('label-tenses').innerText = text.tensesLabel;
        document.getElementById('btn-custom-next').innerText = text.nextBtn;
        document.getElementById('label-quantity').innerText = text.qtyLabel;
        document.getElementById('btn-infinite').innerText = text.infinite;
        document.getElementById('btn-start').innerText = text.startBtn;
        document.getElementById('btn-submit').innerText = text.checkBtn;
        document.getElementById('btn-stop-infinite').innerText = text.stopBtn;
        document.getElementById('user-comment').placeholder = text.commentPlaceholder;
        document.getElementById('btn-email').innerText = text.emailBtn;
        document.getElementById('btn-restart').innerText = text.restartBtn;
        window.goToStep('step-level');
    };

    window.goToStep = function(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'step-custom') window.renderTenseButtons();
        if(id === 'step-conj') { 
            document.getElementById('search-input').value = ""; 
            document.getElementById('conj-results').innerHTML = ""; 
        }
    };

    window.renderTenseButtons = function() {
        const container = document.getElementById('tense-buttons');
        container.innerHTML = "";
        Object.keys(tenseMap).forEach(t => {
            const btn = document.createElement('button');
            btn.className = "btn-choice";
            btn.innerText = (currentLang === 'ko') ? tenseMap[t].ko : t;
            btn.onclick = () => {
                btn.classList.toggle('selected');
                if(selectedTenses.includes(t)) selectedTenses = selectedTenses.filter(x => x !== t);
                else selectedTenses.push(t);
            };
            container.appendChild(btn);
        });
    };

    window.updateSuggestions = function() {
        const input = document.getElementById('search-input').value.toLowerCase().trim();
        const suggBox = document.getElementById('suggestions');
        suggBox.innerHTML = "";
        if (input.length < 1) { suggBox.style.display = "none"; return; }
        const matches = fullDatabase.filter(v => v.verbe.toLowerCase().startsWith(input)).slice(0, 5);
        if (matches.length > 0) {
            matches.forEach(v => {
                const div = document.createElement('div');
                div.className = "suggestion-item";
                div.innerText = `${v.verbe} (${v.traduction || ''})`;
                div.onclick = () => window.displayVerbTables(v);
                suggBox.appendChild(div);
            });
            suggBox.style.display = "block";
        } else {
            suggBox.style.display = "none";
        }
    };

    window.displayVerbTables = function(verb) {
        document.getElementById('suggestions').style.display = "none";
        document.getElementById('search-input').value = verb.verbe;
        const container = document.getElementById('conj-results');
        container.innerHTML = `<h2>${verb.verbe.toUpperCase()}</h2><p>(${verb.traduction || ''})</p>`;
        Object.keys(verb.conjugaisons).forEach(t => {
            const displayTense = (currentLang === 'ko') ? tenseMap[t].ko : t;
            let html = `<div class="review-block"><h3>${displayTense}</h3><table class="review-table">`;
            verb.conjugaisons[t].forEach((conj, idx) => {
                if (conj === "") return;
                html += `<tr><td>${window.getPronoun(idx, conj)}</td><td><b>${conj}</b></td></tr>`;
            });
            container.innerHTML += html + `</table></div>`;
        });
    };

    window.getPronoun = function(pIdx, verbForm) {
        if (pIdx === 0) {
            const firstLetter = verbForm.normalize("NFD").replace(/[\u0300-\u036f]/g, "").charAt(0).toLowerCase();
            const vowels = ['a', 'e', 'i', 'o', 'u', 'y'];
            return vowels.includes(firstLetter) ? "J'" : "Je ";
        }
        return pronoms[pIdx] + " ";
    };

    window.selectLevel = function(lvl) {
        selectedLevel = lvl;
        selectedTenses = Object.keys(tenseWeights[lvl]);
        window.goToStep('step-quantity');
    };

    window.confirmCustomTenses = function() {
        if(selectedTenses.length === 0) return alert(currentLang === 'ko' ? "시제를 선택해 주세요!" : "Choisissez au moins un temps !");
        selectedLevel = "CUSTOM";
        window.goToStep('step-quantity');
    };

    window.startChallenge = function(nb) {
        targetNb = nb || parseInt(document.getElementById('nb-verbes').value);
        score = 0; total = 0; mistakeTracker = [];
        document.getElementById('btn-stop-infinite').style.display = (targetNb === 999) ? 'block' : 'none';
        window.goToStep('step-game');
        window.initJeu();
    };

    window.initJeu = function() {
        if (total >= targetNb) return window.showResults();
        document.getElementById('game-progress').innerText = (targetNb === 999) ? `Verbe ${total + 1} (∞)` : `${total + 1} / ${targetNb}`;
        let valid = false;
        let attempts = 0;
        while(!valid && attempts < 500) {
            attempts++;
            let targetTense = window.pickWeightedTense(selectedTenses);
            const maxLvlIdx = levelsOrder.indexOf(selectedLevel === "CUSTOM" ? "B2" : selectedLevel);
            let pool = fullDatabase.filter(v => levelsOrder.indexOf(v.niveau) <= maxLvlIdx);
            if (selectedLevel === "A1") {
                const isIrregTarget = Math.random() < 0.5;
                let subPool = pool.filter(v => isIrregTarget ? a1Irregulars.includes(v.verbe) : !a1Irregulars.includes(v.verbe));
                if (subPool.length > 0) pool = subPool;
            }
            let finalPool = pool.filter(v => v.conjugaisons[targetTense]);
            if (selectedLevel === "A2" && targetTense === "Conditionnel présent") {
                finalPool = finalPool.filter(v => ["vouloir", "aimer", "pouvoir", "devoir"].includes(v.verbe));
            }
            if (finalPool.length > 0) {
                currentV = finalPool[Math.floor(Math.random() * finalPool.length)];
                currentTense = targetTense;
                valid = true;
            }
        }
        do { currentPIdx = Math.floor(Math.random() * 6); } while (currentV.conjugaisons[currentTense][currentPIdx] === "");
        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('verb-traduction').innerText = currentV.traduction ? `(${currentV.traduction})` : "";
        document.getElementById('tense-display').innerText = (currentLang === 'ko') ? tenseMap[currentTense].ko : currentTense;
        document.getElementById('pronoun').innerText = window.getPronoun(currentPIdx, currentV.conjugaisons[currentTense][currentPIdx]) + "...";
        const input = document.getElementById('answer-input');
        input.value = ""; input.disabled = false;
        document.getElementById('feedback').innerText = "";
        input.focus();
    };

    window.pickWeightedTense = function(availableTenses) {
        if (selectedLevel === "CUSTOM") return availableTenses[Math.floor(Math.random() * availableTenses.length)];
        let weights = tenseWeights[selectedLevel];
        let pool = [];
        availableTenses.forEach(t => {
            let w = weights[t] || 0;
            for (let i = 0; i < w; i++) pool.push(t);
        });
        return pool[Math.floor(Math.random() * pool.length)];
    };

    window.checkAnswer = function() {
        const inputField = document.getElementById('answer-input');
        if (inputField.disabled || !currentV) return;
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const input = inputField.value.trim().toLowerCase();
        inputField.disabled = true;
        total++;
        if (input === solution) {
            score++;
            document.getElementById('feedback').innerHTML = `<span style='color:var(--secondary)'>${i18n[currentLang].successMsg}</span>`;
            setTimeout(window.initJeu, 1000);
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>${i18n[currentLang].errorMsg} <b>${solution}</b></span>`;
            const alreadyNoted = mistakeTracker.some(m => m.verb.verbe === currentV.verbe && m.tense === currentTense);
            if (!alreadyNoted) mistakeTracker.push({verb: currentV, tense: currentTense, errorIdx: currentPIdx});
            setTimeout(window.initJeu, 2500);
        }
    };

    window.showResults = function() {
        window.goToStep('step-results');
        document.getElementById('final-score').innerText = `${score} / ${total}`;
        document.getElementById('final-percent').innerText = `${Math.round((score/total)*100)}% ${i18n[currentLang].statsLabel}`;
        const container = document.getElementById('mistake-container');
        container.innerHTML = mistakeTracker.length > 0 ? `<h3>${i18n[currentLang].reviewTitle}</h3>` : `<h3>${i18n[currentLang].perfectMsg}</h3>`;
        mistakeTracker.forEach(m => {
            const displayTense = (currentLang === 'ko') ? tenseMap[m.tense].ko : m.tense;
            const trad = m.verb.traduction ? ` (${m.verb.traduction})` : "";
            let html = `<div class="review-block"><h3>${m.verb.verbe}${trad} - ${displayTense}</h3><table class="review-table">`;
            m.verb.conjugaisons[m.tense].forEach((conj, idx) => {
                if(conj === "") return;
                html += `<tr ${idx === m.errorIdx ? "class='error-row'" : ""}><td>${window.getPronoun(idx, conj)}</td><td>${conj} ${idx === m.errorIdx ? i18n[currentLang].errorLabel : ''}</td></tr>`;
            });
            container.innerHTML += html + "</table></div>";
        });
    };

    window.sendEmail = function() {
        const emailProf = "m.blancheton@gmail.com";
        const sujet = `Regarde comme je suis trop forte ! (${selectedLevel})`;
        const commentaire = document.getElementById('user-comment').value || "Aucun commentaire.";
        let corps = `Score : ${score} / ${total} (${Math.round((score/total)*100)}%)\nCommentaire : ${commentaire}\n\n`;
        if (mistakeTracker.length > 0) {
            corps += `ERREURS :\n`;
            mistakeTracker.forEach(m => {
                const trad = m.verb.traduction ? ` [${m.verb.traduction}]` : "";
                corps += `\n- ${m.verb.verbe.toUpperCase()}${trad} (${m.tense})\n`;
                m.verb.conjugaisons[m.tense].forEach((conj, idx) => {
                    if(conj === "") return;
                    corps += `${window.getPronoun(idx, conj)}: ${conj}${idx === m.errorIdx ? " <-- ERREUR" : ""}\n`;
                });
            });
        }
        window.location.href = `mailto:${emailProf}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
    };

    window.insertChar = function(char) {
        const input = document.getElementById('answer-input');
        if (input.disabled) return;
        const start = input.selectionStart;
        input.value = input.value.slice(0, start) + char + input.value.slice(input.selectionEnd);
        input.focus();
    };

    // --- 3. INITIALISATION ---
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const active = document.querySelector('.step.active');
            if(active && active.id === 'step-game') window.checkAnswer();
        }
    });

    fetch('verbes.json')
        .then(res => res.json())
        .then(data => { 
            fullDatabase = data; 
            console.log("BDD chargée : " + data.length + " verbes.");
        })
        .catch(err => {
            console.error("Erreur JSON:", err);
            alert("Erreur de chargement de la base de données.");
        });
</script>

</body>
</html>
