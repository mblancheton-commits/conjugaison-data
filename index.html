<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--dark); }
        .app-container { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; min-height: 500px; display: flex; flex-direction: column; margin: 20px 0; }
        
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .step { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Boutons de sélection */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-choice { 
            padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: white; 
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem;
            box-shadow: 0 4px 0 #eee;
        }
        .btn-choice:active { transform: translateY(2px); box-shadow: 0 2px 0 #eee; }
        .btn-choice.selected { 
            background: var(--primary); color: white; border-color: var(--primary); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transform: translateY(2px);
        }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }

        /* Jeu */
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; }
        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 0 #ccc; }

        /* Résultats et Tables */
        .results-header { text-align: center; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .score-big { font-size: 3.5rem; font-weight: bold; color: var(--secondary); margin: 5px 0; }
        .mistake-list { margin-top: 20px; }
        .review-block { background: #fff; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 25px; padding: 15px; overflow: hidden; }
        .review-block h3 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: capitalize; }
        .review-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .review-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .review-table tr:last-child td { border-bottom: none; }
        .error-row { background: #fff0f0; color: var(--error); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Conju-Coach ✍️</h1>

    <!-- ÉTAPE 1 : Choix du Niveau -->
    <div id="step-level" class="step active">
        <p style="text-align:center">Choisissez votre niveau DELF :</p>
        <div class="btn-grid">
            <button class="btn-choice" onclick="selectLevel('A1')">A1</button>
            <button class="btn-choice" onclick="selectLevel('A2')">A2</button>
            <button class="btn-choice" onclick="selectLevel('B1')">B1</button>
            <button class="btn-choice" onclick="selectLevel('B2')">B2</button>
        </div>
        <button class="btn-choice" style="width:100%; margin-top:10px;" onclick="goToStep('step-custom')">⚙️ Personnalisé</button>
    </div>

    <!-- ÉTAPE 2 : Personnalisation Temps -->
    <div id="step-custom" class="step">
        <p style="text-align:center">Quels temps voulez-vous réviser ?</p>
        <div class="btn-grid" id="tense-buttons"></div>
        <button class="btn-full" onclick="confirmCustomTenses()">Suivant ➔</button>
    </div>

    <!-- ÉTAPE 3 : Quantité -->
    <div id="step-quantity" class="step">
        <p style="text-align:center">Combien de verbes pour ce défi ?</p>
        <input type="number" id="nb-verbes" value="10" min="1" max="50">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn-choice" style="flex:1" onclick="startChallenge(999)">Illimité ∞</button>
            <button class="btn-full" style="flex:2; margin:0" onclick="startChallenge()">Commencer !</button>
        </div>
    </div>

    <!-- ÉTAPE 4 : Jeu -->
    <div id="step-game" class="step">
        <div id="game-progress" style="text-align: right; font-weight: bold; color: var(--primary);">0 / 10</div>
        <div class="verb-card">
            <div id="verb-name">---</div>
            <div id="tense-name" style="font-style:italic; color:#666;">-</div>
            <div id="pronoun">---</div>
            <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" spellcheck="false">
            <div class="keyboard">
                <button class="key" onclick="insertChar('é')">é</button>
                <button class="key" onclick="insertChar('è')">è</button>
                <button class="key" onclick="insertChar('à')">à</button>
                <button class="key" onclick="insertChar('ç')">ç</button>
                <button class="key" onclick="insertChar('ê')">ê</button>
                <button class="key" onclick="insertChar('î')">î</button>
            </div>
        </div>
        <button class="btn-full" id="btn-submit" onclick="checkAnswer()">Vérifier</button>
        <div id="feedback" class="feedback" style="text-align:center; font-weight:bold; min-height:40px; margin-top:15px;"></div>
    </div>

    <!-- ÉTAPE 5 : Statistiques -->
    <div id="step-results" class="step">
        <div class="results-header">
            <h2>Résultats</h2>
            <div class="score-big" id="final-score">0 / 0</div>
            <p id="final-percent" style="font-weight:bold">0% de réussite</p>
        </div>
        
        <div id="mistake-container" class="mistake-list">
            <!-- Les tables de conjugaison des erreurs apparaîtront ici -->
        </div>

        <button class="btn-full" onclick="location.reload()">Nouvelle Session</button>
    </div>
</div>

<script>
    let fullDatabase = [];
    let currentV, currentTense, currentPIdx;
    let score = 0, total = 0, targetNb = 10;
    let selectedLevel = 'A1';
    let selectedTenses = [];
    let mistakeTracker = []; // Stocke les objets {verb, tense} pour les erreurs

    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];
    const levelsOrder = ["A1", "A2", "B1", "B2"];
    const allTenses = ["Présent", "Imparfait", "Passé composé", "Plus-que-parfait", "Futur simple", "Conditionnel présent", "Subjonctif présent", "Impératif présent"];

    function goToStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'step-custom') renderTenseButtons();
    }

    function renderTenseButtons() {
        const container = document.getElementById('tense-buttons');
        container.innerHTML = "";
        allTenses.forEach(t => {
            const btn = document.createElement('button');
            btn.className = "btn-choice";
            btn.innerText = t;
            btn.onclick = () => {
                btn.classList.toggle('selected');
                if(selectedTenses.includes(t)) selectedTenses = selectedTenses.filter(x => x !== t);
                else selectedTenses.push(t);
            };
            container.appendChild(btn);
        });
    }

    function selectLevel(lvl) {
        selectedLevel = lvl;
        if (lvl === "A1") selectedTenses = ["Présent"];
        else if (lvl === "A2") selectedTenses = ["Présent", "Imparfait", "Passé composé", "Futur simple", "Conditionnel présent", "Impératif présent"];
        else selectedTenses = ["Présent", "Imparfait", "Passé composé", "Plus-que-parfait", "Futur simple", "Conditionnel présent", "Subjonctif présent"];
        goToStep('step-quantity');
    }

    function confirmCustomTenses() {
        if(selectedTenses.length === 0) return alert("Choisissez au moins un temps !");
        selectedLevel = "CUSTOM";
        goToStep('step-quantity');
    }

    function startChallenge(nb) {
        targetNb = nb || parseInt(document.getElementById('nb-verbes').value);
        score = 0; total = 0; mistakeTracker = [];
        goToStep('step-game');
        initJeu();
    }

    function initJeu() {
        if (total >= targetNb) return showResults();
        
        document.getElementById('game-progress').innerText = `${total + 1} / ${targetNb}`;
        
        let filteredVerbs = (selectedLevel === "CUSTOM") ? fullDatabase : 
            fullDatabase.filter(v => levelsOrder.indexOf(v.niveau) <= levelsOrder.indexOf(selectedLevel));

        let valid = false;
        while(!valid) {
            let tempV = filteredVerbs[Math.floor(Math.random() * filteredVerbs.length)];
            let possibleTenses = Object.keys(tempV.conjugaisons).filter(t => selectedTenses.includes(t));
            if (possibleTenses.length > 0) {
                currentV = tempV;
                currentTense = possibleTenses[Math.floor(Math.random() * possibleTenses.length)];
                valid = true;
            }
        }

        do { currentPIdx = Math.floor(Math.random() * 6); } 
        while (currentV.conjugaisons[currentTense][currentPIdx] === "");

        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        const input = document.getElementById('answer-input');
        input.value = ""; input.disabled = false;
        document.getElementById('feedback').innerText = "";
        input.focus();
    }

    function checkAnswer() {
        const inputField = document.getElementById('answer-input');
        if (inputField.disabled) return;
        
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const input = inputField.value.trim().toLowerCase();
        inputField.disabled = true;
        total++;

        if (input === solution) {
            score++;
            document.getElementById('feedback').innerHTML = "<span style='color:var(--secondary)'>✨ Bravo !</span>";
            setTimeout(initJeu, 1000);
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>❌ Non : <b>${solution}</b></span>`;
            // On enregistre l'erreur si elle n'est pas déjà dans la liste pour ce défi
            const alreadyNoted = mistakeTracker.some(m => m.verb.verbe === currentV.verbe && m.tense === currentTense);
            if (!alreadyNoted) mistakeTracker.push({verb: currentV, tense: currentTense, errorIdx: currentPIdx});
            setTimeout(initJeu, 2500);
        }
    }

    function showResults() {
        goToStep('step-results');
        document.getElementById('final-score').innerText = `${score} / ${total}`;
        const percent = Math.round((score/total)*100);
        document.getElementById('final-percent').innerText = `${percent}% de réussite`;
        
        const container = document.getElementById('mistake-container');
        container.innerHTML = mistakeTracker.length > 0 ? "<h3>Tables à réviser :</h3>" : "<h3>Zéro faute ! Incroyable ! 🏆</h3>";

        mistakeTracker.forEach(m => {
            let html = `<div class="review-block"><h3>${m.verb.verbe} - ${m.tense}</h3><table class="review-table">`;
            m.verb.conjugaisons[m.tense].forEach((conj, idx) => {
                if(conj === "") return;
                const isError = (idx === m.errorIdx) ? "class='error-row'" : "";
                html += `<tr ${isError}><td>${pronoms[idx]}</td><td>${conj}</td></tr>`;
            });
            html += "</table></div>";
            container.innerHTML += html;
        });
    }

    function insertChar(char) {
        const input = document.getElementById('answer-input');
        const start = input.selectionStart;
        input.value = input.value.slice(0, start) + char + input.value.slice(input.selectionEnd);
        input.focus();
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const activeStep = document.querySelector('.step.active').id;
            if(activeStep === 'step-game') checkAnswer();
            else if(activeStep === 'step-quantity') startChallenge();
        }
    });

    fetch('verbes.json').then(res => res.json()).then(data => { fullDatabase = data; });
</script>
</body>
</html>
