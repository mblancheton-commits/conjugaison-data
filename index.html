<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; }
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: var(--dark); }
        
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; }
        #verb-name { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .btn-check { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .feedback { margin-top: 15px; text-align: center; font-weight: bold; min-height: 40px; }
        
        .custom-tenses { display: none; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; text-align: left; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="setup-section">
        <label><b>Niveau DELF :</b></label>
        <select id="level-select" onchange="toggleCustomTenses()">
            <option value="A1">A1 (Débutant)</option>
            <option value="A2">A2 (Élémentaire)</option>
            <option value="B1">B1 (Intermédiaire)</option>
            <option value="B2">B2 (Avancé)</option>
            <option value="CUSTOM">Personnalisé...</option>
        </select>

        <div id="custom-box" class="custom-tenses">
            <label><input type="checkbox" class="tense-opt" value="Présent"> Présent</label>
            <label><input type="checkbox" class="tense-opt" value="Imparfait"> Imparfait</label>
            <label><input type="checkbox" class="tense-opt" value="Passé composé"> Passé composé</label>
            <label><input type="checkbox" class="tense-opt" value="Futur simple"> Futur simple</label>
            <label><input type="checkbox" class="tense-opt" value="Conditionnel présent"> Conditionnel</label>
            <label><input type="checkbox" class="tense-opt" value="Subjonctif présent"> Subjonctif</label>
            <label><input type="checkbox" class="tense-opt" value="Impératif présent"> Impératif</label>
        </div>
        <button onclick="initJeu()" style="margin-top:10px; width:100%; cursor:pointer;">Appliquer / Nouveau Verbe</button>
    </div>

    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Total: <span id="total">0</span></span>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name" style="font-style:italic; color:#666;">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" spellcheck="false">
        
        <div class="keyboard">
            <button class="key" onclick="insertChar('é')">é</button>
            <button class="key" onclick="insertChar('è')">è</button>
            <button class="key" onclick="insertChar('à')">à</button>
            <button class="key" onclick="insertChar('ç')">ç</button>
            <button class="key" onclick="insertChar('ê')">ê</button>
            <button class="key" onclick="insertChar('î')">î</button>
        </div>
    </div>

    <button id="btn-submit" class="btn-check" onclick="checkAnswer()">Vérifier</button>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    let fullDatabase = [];
    let currentV, currentTense, currentPIdx;
    let score = 0, total = 0;
    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];

    // 1. Logique de filtrage DELF
    function getAvailableOptions() {
        const level = document.getElementById('level-select').value;
        let tenses = [];
        let verbFilter = (v) => true; // Par défaut tous les verbes

        if (level === "A1") {
            tenses = ["Présent"];
            const a1Irregulars = ["être", "avoir", "faire", "aller", "prendre", "vouloir", "pouvoir"];
            verbFilter = (v) => v.niveau === "A1" || a1Irregulars.includes(v.verbe);
        } 
        else if (level === "A2") {
            tenses = ["Présent", "Imparfait", "Passé composé", "Futur simple", "Conditionnel présent", "Impératif présent"];
            // Restriction spécifique A2 pour le conditionnel
            verbFilter = (v) => true; 
        } 
        else if (level === "B1" || level === "B2") {
            tenses = ["Présent", "Imparfait", "Passé composé", "Plus-que-parfait", "Futur simple", "Conditionnel présent", "Subjonctif présent"];
        } 
        else if (level === "CUSTOM") {
            tenses = Array.from(document.querySelectorAll('.tense-opt:checked')).map(cb => cb.value);
        }

        return { tenses, verbFilter, level };
    }

    window.toggleCustomTenses = function() {
        document.getElementById('custom-box').style.display = 
            (document.getElementById('level-select').value === "CUSTOM") ? "grid" : "none";
    };

    window.initJeu = function() {
        const options = getAvailableOptions();
        let filteredVerbs = fullDatabase.filter(options.verbFilter);
        
        if (filteredVerbs.length === 0 || options.tenses.length === 0) {
            document.getElementById('verb-name').innerText = "Sélectionnez au moins un temps";
            return;
        }

        // Tirage au sort du verbe
        let validPairFound = false;
        let attempts = 0;

        while(!validPairFound && attempts < 100) {
            attempts++;
            let tempV = filteredVerbs[Math.floor(Math.random() * filteredVerbs.length)];
            let availableInVerb = Object.keys(tempV.conjugaisons).filter(t => options.tenses.includes(t));
            
            if (availableInVerb.length > 0) {
                currentV = tempV;
                currentTense = availableInVerb[Math.floor(Math.random() * availableInVerb.length)];
                
                // Restriction spéciale A2 : Conditionnel seulement pour verbes de politesse
                if (options.level === "A2" && currentTense === "Conditionnel présent") {
                    const a2CondVerbs = ["vouloir", "aimer", "pouvoir", "devoir"];
                    if (!a2CondVerbs.includes(currentV.verbe)) continue;
                }
                
                validPairFound = true;
            }
        }

        currentPIdx = Math.floor(Math.random() * 6);
        document.getElementById('answer-input').disabled = false;
        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').focus();
    };

    // Fonctions utilitaires (InsertChar, CheckAnswer...) identiques au code précédent
    window.insertChar = function(char) {
        const input = document.getElementById('answer-input');
        const start = input.selectionStart;
        input.value = input.value.slice(0, start) + char + input.value.slice(input.selectionEnd);
        input.focus();
        input.setSelectionRange(start + 1, start + 1);
    };

    window.checkAnswer = function() {
        const inputField = document.getElementById('answer-input');
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const input = inputField.value.trim().toLowerCase();
        
        inputField.disabled = true;
        total++;
        if (input === solution) {
            score++;
            document.getElementById('feedback').innerHTML = "<span style='color:green'>Excellent !</span>";
            setTimeout(window.initJeu, 1000);
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:red'>Erreur. C'était : <b>${solution}</b></span>`;
            setTimeout(window.initJeu, 2500);
        }
        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = total;
    };

    fetch('verbes.json').then(res => res.json()).then(data => {
        fullDatabase = data;
        initJeu();
    });
</script>
</body>
</html>
