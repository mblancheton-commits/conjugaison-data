<!DOCTYPE html>
<html lang="fr">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; --warning: #f39c12; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--dark); }
        .app-container { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; min-height: 550px; display: flex; flex-direction: column; margin: 20px 0; }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .step { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-choice { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; box-shadow: 0 4px 0 #eee; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-choice:active { transform: translateY(2px); box-shadow: 0 2px 0 #eee; }
        .btn-choice.selected { background: var(--primary); color: white; border-color: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transform: translateY(2px); }
        .btn-full { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        input[type="range"] { accent-color: var(--primary); cursor: pointer; }
        .filter-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-group select { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; background: #fafafa; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        .leaderboard-table th { background: var(--primary); color: white; padding: 10px; text-align: left; }
        .leaderboard-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .leaderboard-table tr:nth-child(1) { font-weight: bold; color: #d35400; background: #fffdf0; }
        .leaderboard-table tr:nth-child(2) { font-weight: bold; color: #7f8c8d; background: #fdfdfd; }
        .leaderboard-table tr:nth-child(3) { font-weight: bold; color: #b87333; background: #fcf9f2; }
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; position: relative; }
        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #verb-traduction { font-size: 0.95rem; color: #7f8c8d; display: block; margin-bottom: 10px; font-style: italic; font-weight: normal; }
        #tense-display { font-size: 1.4rem; font-weight: bold; color: var(--warning); margin: 10px 0; display: block; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        #game-timer { font-size: 1.8rem; font-weight: bold; color: var(--error); text-align: center; margin-bottom: 5px; display: none; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; text-align: center; outline: none; font-family: inherit; }
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 0 #ccc; }
        .review-block { background: #fff; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 25px; padding: 15px; }
        .review-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .review-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .error-row { background: #fff0f0; color: var(--error); font-weight: bold; }
    </style>
</head>
<body>
<div class="app-container">
    <h1 id="main-title">Conju-Coach ✍️</h1>

    <!-- 0. LANGUE -->
    <div id="step-lang" class="step active">
        <p style="text-align:center; font-weight:bold;">Choisissez votre langue<br>언어를 선택하세요</p>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.setLang('fr')">Français 🇫🇷</button>
            <button class="btn-choice" onclick="window.setLang('ko')">한국어 🇰🇷</button>
        </div>
    </div>

    <!-- 1. MENU PRINCIPAL -->
    <div id="step-main-menu" class="step">
        <button id="btn-menu-classic" class="btn-full" style="background:var(--primary)" onclick="window.goToStep('step-level')">🎯 Entraînement Classique</button>
        <button id="btn-menu-challenge" class="btn-full" style="background:var(--warning)" onclick="window.goToStep('step-challenges')">🔥 Challenges (Défis)</button>
        <button id="btn-menu-conj" class="btn-full" style="background:#34495e" onclick="window.goToStep('step-conj')">📖 Conjugueur</button>
        <button id="btn-menu-lb" class="btn-full" style="background:var(--secondary)" onclick="window.loadLeaderboard()">🏆 Classements</button>
    </div>

    <!-- 2. CHOIX NIVEAU -->
    <div id="step-level" class="step">
        <h2 id="label-level" style="text-align:center; margin:0;">-</h2>
        <div class="btn-grid">
            <button class="btn-choice" onclick="window.selectLevel('A1')">A1</button>
            <button class="btn-choice" onclick="window.selectLevel('A2')">A2</button>
            <button class="btn-choice" onclick="window.selectLevel('B1')">B1</button>
            <button class="btn-choice" onclick="window.selectLevel('B2')">B2</button>
        </div>
        <button id="btn-custom-trigger" class="btn-choice" style="width:100%; margin-top:10px;" onclick="window.openCustomMode()">-</button>
        <button class="btn-full" style="background:#95a5a6; margin-top:20px;" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 3. CHALLENGES -->
    <div id="step-challenges" class="step">
        <h2 style="text-align:center; margin:0;">🔥 Modes de Jeu</h2>
        <div class="btn-grid">
            <button id="btn-mode-sd" class="btn-choice challenge-btn" onclick="window.selectChallengeMode('sudden-death', this)">☠️ <span id="txt-sd">Mort Subite</span></button>
            <button id="btn-mode-ta" class="btn-choice challenge-btn" onclick="window.selectChallengeMode('time-attack', this)">⏱️ <span id="txt-ta">Time Attack</span></button>
        </div>
        <button id="btn-mode-ta-all" class="btn-choice challenge-btn" style="width:100%; margin-top:10px;" onclick="window.selectChallengeMode('time-attack-weighted', this)">🌟 <span id="txt-ta-all">Time Attack (Tous verbes)</span></button>
        <div id="challenge-level-select" style="display:none; margin-top:15px; border-top:1px dashed #ddd; padding-top:15px;">
            <p id="label-challenge-lvl" style="text-align:center; font-weight:bold;">Choisissez le niveau :</p>
            <div class="btn-grid">
                <button class="btn-choice" onclick="window.startChallengeGame('A1')">A1</button>
                <button class="btn-choice" onclick="window.startChallengeGame('A2')">A2</button>
                <button class="btn-choice" onclick="window.startChallengeGame('B1')">B1</button>
                <button class="btn-choice" onclick="window.startChallengeGame('B2')">B2</button>
            </div>
        </div>
        <button class="btn-full" style="background:#95a5a6" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 4. CUSTOM -->
    <div id="step-custom" class="step">
        <p id="label-tenses" style="text-align:center; margin-bottom:5px;">-</p>
        <div class="btn-grid" id="tense-buttons"></div>
        <div id="custom-sliders-container"></div>
        <button id="btn-custom-next" class="btn-full" onclick="window.confirmCustomTenses()">-</button>
        <button class="btn-full" style="background:#95a5a6; margin-top:10px;" onclick="window.goToStep('step-level')">➔ Retour</button>
    </div>

    <!-- 5. CLASSEMENT -->
    <div id="step-leaderboard" class="step">
        <h2 id="label-lb-title" style="text-align:center; margin:0;">🏆 Top Scores</h2>
        <div class="filter-group">
            <select id="lb-time" onchange="window.updateLeaderboardView()">
                <option id="opt-time-week" value="week">Semaine</option>
                <option id="opt-time-month" value="month">Mois</option>
                <option id="opt-time-all" value="all">All-Time</option>
            </select>
            <select id="lb-mode" onchange="window.updateLeaderboardView()">
                <option id="opt-mode-sd" value="sudden-death">Mort Subite</option>
                <option id="opt-mode-ta" value="time-attack">Time Attack</option>
                <option id="opt-mode-ta-all" value="time-attack-weighted">Time Attack (Tous les verbes)</option>
            </select>
        </div>
        <select id="lb-level" onchange="window.updateLeaderboardView()">
            <option value="A1">Niveau A1</option>
            <option value="A2">Niveau A2</option>
            <option value="B1">Niveau B1</option>
            <option value="B2">Niveau B2</option>
        </select>
        <div id="leaderboard-content" style="min-height: 200px; overflow-y:auto;"></div>
        <button class="btn-full" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>

    <!-- 6. QUANTITÉ -->
    <div id="step-quantity" class="step">
        <p id="label-quantity" style="text-align:center">-</p>
        <input type="number" id="nb-verbes" value="10" min="1" max="50">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button id="btn-infinite" class="btn-choice" style="flex:1" onclick="window.startClassic(999)">-</button>
            <button id="btn-start" class="btn-full" style="flex:2; margin:0" onclick="window.startClassic()"></button>
        </div>
    </div>

    <!-- 7. JEU -->
    <div id="step-game" class="step">
        <div id="game-progress" style="text-align: right; font-weight: bold; color: var(--primary);">0 / 10</div>
        <div id="game-timer">⏳ 01:00</div>
        <div class="verb-card">
            <div id="verb-name">---</div>
            <span id="verb-traduction"></span>
            <span id="tense-display">-</span>
            <div id="pronoun">---</div>
            <input type="text" id="answer-input" autocomplete="off" spellcheck="false">
            <div class="keyboard">
                <button class="key" onclick="window.insertChar('é')">é</button>
                <button class="key" onclick="window.insertChar('è')">è</button>
                <button class="key" onclick="window.insertChar('à')">à</button>
                <button class="key" onclick="window.insertChar('ç')">ç</button>
                <button class="key" onclick="window.insertChar('ê')">ê</button>
                <button class="key" onclick="window.insertChar('î')">î</button>
            </div>
        </div>
        <button id="btn-submit" class="btn-full" onclick="window.checkAnswer()">Vérifier</button>
        <button id="btn-stop-infinite" class="btn-full" style="background:#95a5a6; display:none;" onclick="window.stopGame()">Terminer</button>
        <div id="feedback" style="text-align:center; font-weight:bold; min-height:40px; margin-top:15px;"></div>
    </div>

    <!-- 8. RÉSULTATS -->
    <div id="step-results" class="step">
        <div class="results-header" style="text-align:center;">
            <div class="score-big" id="final-score">0</div>
            <p id="final-percent" style="font-weight:bold; font-size:1.2rem; margin-top:5px;">-</p>
        </div>
        <div id="save-score-section" style="background:#fef9e7; padding:15px; border-radius:12px; margin:10px 0; border:1px solid gold; text-align:center;">
            <p id="label-pseudo" style="margin:0 0 10px 0; font-weight:bold;"></p>
            <input type="text" id="user-pseudo" maxlength="12" placeholder="Pseudo" style="padding:10px; margin-bottom:10px;">
            <button id="btn-save-score" class="btn-full" style="background:gold; color:var(--dark); margin:0;" onclick="window.saveScore()"></button>
        </div>
        <div id="results-leaderboard" style="display:none; margin:15px 0;">
            <h3 id="label-top10" style="text-align:center; margin-bottom:10px;">🏆 Top 10 Actuel</h3>
            <div id="mini-leaderboard-content"></div>
        </div>
        <div class="email-section" style="margin:10px 0;">
            <textarea id="user-comment" rows="2" style="width:100%; border-radius:8px; padding:10px; border:1px solid #ddd;"></textarea>
            <button id="btn-kakao" class="btn-full" style="background:#FEE500; color:#381E1F; margin-top:5px;" onclick="window.sendKakao()"></button>
        </div>
        <div id="mistake-container"></div>
        <button id="btn-restart" class="btn-full" onclick="location.reload()">Recommencer</button>
    </div>

    <!-- 9. CONJUGUEUR -->
    <div id="step-conj" class="step">
        <p id="label-search" style="text-align:center"></p>
        <input type="text" id="search-input" oninput="window.updateSuggestions()" autocomplete="off">
        <div id="suggestions" style="background:white; border:1px solid #ddd; display:none; max-height:100px; overflow:auto;"></div>
        <div id="conj-results" style="margin-top:20px; overflow-y:auto; max-height:350px;"></div>
        <button class="btn-full" onclick="window.goToStep('step-main-menu')">➔ Retour</button>
    </div>
</div>

        if (mode === 'time-attack' || mode === 'time_attack') return 'time-attack';

    window.getPronoun = function(pIdx, verbForm, tName) {
        if (tName === "Impératif présent") return "(" + pronoms[pIdx] + ") ";
        if (pIdx === 0) {
            const first = verbForm.normalize("NFD").replace(/[\u0300-\u036f]/g, "").charAt(0).toLowerCase();
            return ['a','e','i','o','u','y','h'].includes(first) ? "J'" : "Je ";
        }
        return pronoms[pIdx] + " ";
    };

    window.startGameLogic = function() {
        if (!fullDatabase.length) {
            alert(i18n[currentLang].dbError);
            return;
        }
        score = 0; total = 0; mistakeTracker = []; playedVerbs = [];
        window.goToStep('step-game');
        document.getElementById('btn-stop-infinite').style.display = (targetNb === 999 && gameMode === 'classic') ? 'block' : 'none';
        if (gameMode.includes('time-attack')) {
            document.getElementById('game-timer').style.display = 'block';
            timeLeft = 60;
            document.getElementById('game-timer').innerText = "⏳ 01:00";
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('game-timer').innerText = `⏳ 00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); window.showResults(); }
            }, 1000);
        } else {
            document.getElementById('game-timer').style.display = 'none';
        }
        window.initJeu();
    };

    window.initJeu = function() {
        if (gameMode === 'classic' && total >= targetNb) return window.showResults();
        if (gameMode === 'time-attack-weighted') {
            document.getElementById('game-progress').innerText = `Score : ${score} pts`;
        } else {
            document.getElementById('game-progress').innerText = (targetNb === 999) ? `Verbe ${total + 1} (∞)` : `${total + 1} / ${targetNb}`;
        }
        let valid = false;
        let failSafe = 0;
        while(!valid && failSafe < 1000) {
            failSafe++;
            let tempTense;
            let validVerbs = [];
            if (gameMode === 'time-attack-weighted') {
                tempTense = selectedTenses[Math.floor(Math.random() * selectedTenses.length)];
                validVerbs = fullDatabase.filter(v => v.conjugaisons && v.conjugaisons[tempTense]);
            } else if (selectedLevel === 'Custom') {
                let tenses = Object.keys(customWeights);
                if (tenses.length === 0) break;
                let weights = Object.values(customWeights);
                let rand = Math.random() * 100;
                let sum = 0;
                tempTense = tenses[0];
                for(let i=0; i<tenses.length; i++) {
                    sum += weights[i];
                    if(rand <= sum) { tempTense = tenses[i]; break; }
                }
                validVerbs = fullDatabase.filter(v => v.conjugaisons && v.conjugaisons[tempTense]);
            } else {
                let config = levelConfigs[selectedLevel];
                let allowedLevels = levelsAllowed[selectedLevel];
                let tenses = Object.keys(config.tenses);
                let weights = Object.values(config.tenses);
                let rand = Math.random() * weights.reduce((a,b)=>a+b, 0);
                let sum = 0;
                tempTense = tenses[0];
                for(let i=0; i<tenses.length; i++) {
                    sum += weights[i];
                    if(rand <= sum) { tempTense = tenses[i]; break; }
                }
                validVerbs = fullDatabase.filter(v => {
                    if (!v.niveau || !allowedLevels.includes(v.niveau)) return false;
                    if (!v.conjugaisons || !v.conjugaisons[tempTense]) return false;
                    if (selectedLevel === "A2" && tempTense === "Conditionnel présent") {
                        if (!config.politesse.includes(v.verbe.toLowerCase())) return false;
                    }
                    return true;
                });
                if (selectedLevel === "A1" && validVerbs.length > 0) {
                    let wantIrregular = Math.random() < 0.5;
                    let filteredA1 = validVerbs.filter(v => {
                        let isIrreg = config.irreguliers.includes(v.verbe.toLowerCase());
                        return isIrreg === wantIrregular;
                    });
                    if (filteredA1.length > 0) { validVerbs = filteredA1; }
                }
            }
            if (validVerbs.length > 0) {
                let unplayedVerbs = validVerbs.filter(v => !playedVerbs.includes(v.verbe + '-' + tempTense));
                if (unplayedVerbs.length > 0) validVerbs = unplayedVerbs;
                currentV = validVerbs[Math.floor(Math.random() * validVerbs.length)];
                currentTense = tempTense;
                playedVerbs.push(currentV.verbe + '-' + currentTense);
                valid = true;
            }
        }
        if(!valid) {
            currentV = fullDatabase.find(v => v.conjugaisons) || fullDatabase[0];
            currentTense = currentV.conjugaisons ? Object.keys(currentV.conjugaisons)[0] : "Présent";
        }
        do {
            currentPIdx = Math.floor(Math.random() * 6);
        } while (currentV.conjugaisons[currentTense][currentPIdx] === "");
        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('verb-traduction').innerText = currentV.traduction ? `(${currentV.traduction})` : "";
        document.getElementById('tense-display').innerText = (currentLang === 'ko') ? (tenseMap[currentTense]?.ko || currentTense) : currentTense;
        document.getElementById('pronoun').innerText = window.getPronoun(currentPIdx, currentV.conjugaisons[currentTense][currentPIdx], currentTense) + "...";
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').disabled = false;
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').focus();
    };

    window.checkAnswer = function() {
        const inputField = document.getElementById('answer-input');
        if (inputField.disabled || !currentV) return;
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const input = inputField.value.trim().toLowerCase();
        inputField.disabled = true;
        total++;
        if (input === solution) {
            let pts = 1;
            if (gameMode === 'time-attack-weighted') {
                const lvl = currentV.niveau || "A1";
                pts = (lvl === 'A2') ? 2 : (lvl === 'B1') ? 3 : (lvl === 'B2') ? 5 : 1;
            }
            score += pts;
            let ptsText = gameMode === 'time-attack-weighted' ? ` (+${pts} pts)` : '';
            document.getElementById('feedback').innerHTML = `<span style='color:var(--secondary)'>${i18n[currentLang].successMsg}${ptsText}</span>`;
            setTimeout(window.initJeu, 800);
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>${i18n[currentLang].errorMsg} <b>${solution}</b></span>`;
            mistakeTracker.push({verb: currentV, tense: currentTense, errorIdx: currentPIdx});
            if(gameMode === 'sudden-death') {
                if(timerInterval) clearInterval(timerInterval);
                setTimeout(window.showResults, 2000);
            } else {
                setTimeout(window.initJeu, 2000);
            }
        }
    };

    window.stopGame = function() {
        if(timerInterval) clearInterval(timerInterval);
        window.showResults();
    };

    window.showResults = function() {
        if(timerInterval) clearInterval(timerInterval);

            document.getElementById('final-score').innerText = `${score} pts`;
            document.getElementById('final-percent').innerText = `${successRate}% ${i18n[currentLang].statsLabel} (${total} ${i18n[currentLang].verbsAttempted})`;
        } else if (gameMode === 'time-attack' || gameMode === 'sudden-death') {
            document.getElementById('final-score').innerText = `${score}`;
            document.getElementById('final-percent').innerText = `${successRate}% ${i18n[currentLang].statsLabel} (${total} ${i18n[currentLang].verbsAttempted})`;
        } else {
            document.getElementById('final-score').innerText = `${score} / ${total}`;
            document.getElementById('final-percent').innerText = `${successRate}% ${i18n[currentLang].statsLabel}`;
        }

        const container = document.getElementById('mistake-container');
        container.innerHTML = mistakeTracker.length > 0 ? `<h3>${i18n[currentLang].reviewTitle}</h3>` : `<h3>${i18n[currentLang].perfectMsg}</h3>`;
        mistakeTracker.forEach(m => {
            const displayTense = (currentLang === 'ko') ? (tenseMap[m.tense]?.ko || m.tense) : m.tense;
            let html = `<div class="review-block"><h3>${m.verb.verbe} - ${displayTense}</h3><table class="review-table">`;
            m.verb.conjugaisons[m.tense].forEach((c, idx) => {
                if(c) html += `<tr ${idx === m.errorIdx ? "class='error-row'" : ""}><td>${window.getPronoun(idx, c, m.tense)}</td><td>${c}</td></tr>`;
            });
            container.innerHTML += html + "</table></div>";
        });

        if (gameMode !== 'classic') {
            window.loadMiniLeaderboard();
        } else {
            document.getElementById('results-leaderboard').style.display = 'none';

    window.sendKakao = function() {
        let modeKo = gameMode === 'classic' ? '기본 연습' : gameMode === 'sudden-death' ? '서든 데스' : gameMode === 'time-attack' ? '타임 어택' : '타임 어택 (모든 동사)';
        let modeFr = gameMode === 'classic' ? 'Classique' : gameMode === 'sudden-death' ? 'Mort Subite' : gameMode === 'time-attack' ? 'Time Attack' : 'Time Attack (Tous les verbes)';

        let lvlDisplay = selectedLevel === 'all' ? 'Tous / 전체' : selectedLevel;
        const successRate = total > 0 ? Math.round((score / total) * 100) : 0;
        let texteMessage = currentLang === 'ko'
            ? `🏆 [Conju-Coach 결과]\n• 모드: ${modeKo}\n• 레벨: ${lvlDisplay}\n• 점수: ${score}\n• 성공률: ${successRate}%\n• 시도한 동사: ${total}\n💬 메시지: ${userComment || "없음"}\n`
            : `🏆 [Résultat Conju-Coach]\n• Mode : ${modeFr}\n• Niveau : ${lvlDisplay}\n• Score : ${score}\n• Taux de réussite : ${successRate}%\n• Total tentés : ${total}\n💬 Message : ${userComment || "Aucun"}\n`;
        if (mistakeTracker.length > 0) {
            texteMessage += currentLang === 'ko' ? `\n❌ 틀린 동사 복습 :\n` : `\n❌ Erreurs à réviser :\n`;
            mistakeTracker.forEach(m => {
                const pron = window.getPronoun(m.errorIdx, m.verb.conjugaisons[m.tense][m.errorIdx], m.tense).trim();
                const sol = m.verb.conjugaisons[m.tense][m.errorIdx];
                texteMessage += `- ${m.verb.verbe.toUpperCase()} (${m.tense}) -> ${pron} ${sol}\n`;
            });
        } else {
            texteMessage += currentLang === 'ko' ? `\n🏆 오답 없음! 완벽해요!` : `\n🏆 Zéro faute ! Parfait !`;
        }
        if (navigator.share) {
            navigator.share({ title: 'Conju-Coach', text: texteMessage }).catch(() => fallbackCopy(texteMessage));
        } else {
            fallbackCopy(texteMessage);
        }
    };

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert(currentLang === 'ko'
                ? "결과가 복사되었습니다! 카카오톡이나 메시지 창을 열어 마튜 쌤에게 붙여넣기 해주세요 💛"
                : "Résultat copié ! Tu peux maintenant le coller dans KakaoTalk ou tes messages pour Matthieu 💛");
        } catch (err) {
            alert("Erreur de copie. Veuillez sélectionner et copier le texte manuellement.");
        }
        document.body.removeChild(textArea);
    }

    // --- FIREBASE SAVE & LOAD (CORRIGÉ) ---
    window.saveScore = function() {
        const pseudo = document.getElementById('user-pseudo').value.trim();
        if(!pseudo) return alert(currentLang === 'ko' ? "닉네임을 입력해주세요!" : "Indique un pseudo !");
        const scoreData = {
            pseudo: pseudo,
            score: score,
            mode: gameMode,
            level: gameMode === 'time-attack-weighted' ? 'all' : selectedLevel,
            time: Date.now()
        };
        database.ref('scores').push(scoreData)
            .then(() => {
                alert(i18n[currentLang].scoreSaved);
                document.getElementById('save-score-section').style.display = "none";
                window.loadMiniLeaderboard();
            }).catch((error) => {
                console.error("Erreur Firebase:", error);
                alert(i18n[currentLang].scoreError);
            });

    window.loadMiniLeaderboard = function() {
        document.getElementById('results-leaderboard').style.display = 'block';
        document.getElementById('mini-leaderboard-content').innerHTML = `<p style='text-align:center;'>${currentLang === 'ko' ? "로딩 중... ⏳" : "Chargement... ⏳"}</p>`;
        database.ref('scores').once('value').then((snapshot) => {
            let scoresList = [];
            snapshot.forEach((childSnapshot) => {
                let s = childSnapshot.val();
                let expectedLevel = (gameMode === 'time-attack-weighted') ? 'all' : selectedLevel;
                const sMode = getNormalizedMode(s.mode);
                const fMode = getNormalizedMode(gameMode);
                if (sMode === fMode && s.level === expectedLevel) scoresList.push(s);
            });
            scoresList.sort((a,b) => {
                const scoreA = parseInt(a.score !== undefined ? a.score : a.val) || 0;
                const scoreB = parseInt(b.score !== undefined ? b.score : b.val) || 0;
                return scoreB - scoreA;
            });
            let html = `<table class="leaderboard-table"><tr><th>#</th><th>${currentLang === 'ko' ? '이름' : 'Nom'}</th><th>${currentLang === 'ko' ? '점수' : 'Score'}</th></tr>`;
            if(scoresList.length === 0) {
                html += `<tr><td colspan="3" style="text-align:center; padding:10px;">${currentLang === 'ko' ? '첫 번째로 기록을 남겨보세요!' : 'Soyez le premier à enregistrer un score !'}</td></tr>`;
            } else {
                scoresList.slice(0,10).forEach((s, idx) => {
                    let textScore = gameMode === 'time-attack-weighted' ? `${s.score || s.val} pts` : (s.score || s.val);
                    let rankEmote = idx === 0 ? "🥇 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : "";
                    html += `<tr><td>${rankEmote}${idx+1}</td><td>${s.pseudo}</td><td style="font-weight:bold;">${textScore}</td></tr>`;
                });
            }
            html += `</table>`;
            document.getElementById('mini-leaderboard-content').innerHTML = html;
        });
    };

window.updateLeaderboardView = function() {
    // Empêcher l'exécution si les données ne sont pas encore chargées
    if (firebaseScores.length === 0) {
        console.warn("Aucune donnée dans firebaseScores, attendez le chargement...");

    console.log("Filtres appliqués :", { timeF, modeF, levelF });

    const now = Date.now();
    let filtered = firebaseScores.filter(s => {
        const sMode = getNormalizedMode(s.mode || (s.path && s.path.includes('sudden_death') ? 'sudden-death' : 'time-attack'));
        const fMode = getNormalizedMode(modeF);
        if (sMode !== fMode) return false;

        if (fMode !== 'time-attack-weighted') {
            const sLvl = (s.level || '').toUpperCase();
            const fLvl = (levelF || '').toUpperCase();
            if (sLvl !== fLvl) return false;
        }

        const timestamp = s.time || s.date;
        if (timestamp) {
            const diff = now - timestamp;
            if (timeF === 'week' && diff > 7 * 86400000) return false;
            if (timeF === 'month' && diff > 30 * 86400000) return false;
        } else if (timeF !== 'all') {
            return false;
        }
        return true;
    });

    console.log("Scores filtrés :", filtered.length);
    filtered.sort((a,b) => {
        const scoreA = parseInt(a.score !== undefined ? a.score : a.val) || 0;
        const scoreB = parseInt(b.score !== undefined ? b.score : b.val) || 0;
        return scoreB - scoreA;
    });

    // Construction du tableau
    let html = `<table class="leaderboard-table"><tr><th>#</th><th>${currentLang === 'ko' ? '이름' : 'Nom'}</th><th>${currentLang === 'ko' ? '점수' : 'Score'}</th></tr>`;
    if (filtered.length === 0) {
        html += `<tr><td colspan="3" style="text-align:center; padding:20px;">${currentLang === 'ko' ? "이 필터에 해당하는 기록이 없습니다" : "Aucun score pour ce filtre"}</td></tr>`;
    } else {
        filtered.slice(0,10).forEach((s, idx) => {
            const sVal = s.score !== undefined ? s.score : s.val;
            let textScore = modeF === 'time-attack-weighted' ? `${sVal} pts` : sVal;
            let rankEmote = idx === 0 ? "🥇 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : "";
            html += `<tr><td>${rankEmote}${idx+1}</td><td>${s.pseudo}</td><td style="font-weight:bold;">${textScore}</td></tr>`;
        });
    }
    html += `</table>`;
    document.getElementById('leaderboard-content').innerHTML = html;
};

        let filtered = firebaseScores.filter(s => {
            const sMode = getNormalizedMode(s.mode || (s.path && s.path.includes('sudden_death') ? 'sudden-death' : 'time-attack'));
            const fMode = getNormalizedMode(modeF);
            if(sMode !== fMode) return false;
            if(fMode !== 'time-attack-weighted') {
                const sLvl = (s.level || '').toUpperCase();
                const fLvl = (levelF || '').toUpperCase();
                if (sLvl !== fLvl) return false;
            }
            const timestamp = s.time || s.date;
            if (timestamp) {
                const diff = now - timestamp;
                if(timeF === 'week' && diff > 7 * 86400000) return false;
                if(timeF === 'month' && diff > 30 * 86400000) return false;
            } else if (timeF !== 'all') {
                return false;
            }
            return true;
        });
        filtered.sort((a,b) => {
            const scoreA = parseInt(a.score !== undefined ? a.score : a.val) || 0;
            const scoreB = parseInt(b.score !== undefined ? b.score : b.val) || 0;
            return scoreB - scoreA;
        });
        let html = `<table class="leaderboard-table"><tr><th>#</th><th>${currentLang === 'ko' ? '이름' : 'Nom'}</th><th>${currentLang === 'ko' ? '점수' : 'Score'}</th></tr>`;
        if(filtered.length === 0) {
            html += `<tr><td colspan="3" style="text-align:center; padding:20px;">${currentLang === 'ko' ? "이 필터에 해당하는 기록이 없습니다" : "Aucun score pour ce filtre"}</td></tr>`;
        } else {
            filtered.slice(0,10).forEach((s, idx) => {
                const sVal = s.score !== undefined ? s.score : s.val;
                let textScore = modeF === 'time-attack-weighted' ? `${sVal} pts` : sVal;
                let rankEmote = idx === 0 ? "🥇 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : "";
                html += `<tr><td>${rankEmote}${idx+1}</td><td>${s.pseudo}</td><td style="font-weight:bold;">${textScore}</td></tr>`;
            });
        }
        html += `</table>`;
        document.getElementById('leaderboard-content').innerHTML = html;
    };

    // --- CUSTOM SLIDERS (inchangé) ---
    window.openCustomMode = function() {
        selectedLevel = 'Custom';
        customWeights = {};
        const container = document.getElementById('tense-buttons');
        container.innerHTML = '';
        document.getElementById('custom-sliders-container').innerHTML = '';
        Object.keys(tenseMap).forEach(tense => {
            let btn = document.createElement('button');
            btn.className = 'btn-choice tense-toggle';
            btn.dataset.tense = tense;
            btn.innerText = currentLang === 'ko' ? tenseMap[tense].ko : tense;
            btn.onclick = function() { window.toggleCustomTense(this, tense); };
            container.appendChild(btn);
        });
        document.getElementById('label-tenses').innerText = currentLang === 'ko' ? "연습할 시제를 선택하세요 :" : "Choisissez les temps :";
        document.getElementById('btn-custom-next').innerText = currentLang === 'ko' ? "다음 ➔" : "Suivant ➔";
        window.goToStep('step-custom');
    };

    window.toggleCustomTense = function(btn, tense) {
        btn.classList.toggle('selected');
        let selected = Array.from(document.querySelectorAll('.tense-toggle.selected')).map(b => b.dataset.tense);
        customWeights = {};
        let count = selected.length;
        if (count > 0) {
            let baseW = Math.floor(100 / count);
            let remainder = 100 % count;
            selected.forEach((t, i) => {
                customWeights[t] = baseW + (i < remainder ? 1 : 0);
            });
        }
        window.renderCustomSliders();
    };

    window.renderCustomSliders = function() {
        let container = document.getElementById('custom-sliders-container');
        let keys = Object.keys(customWeights);
        if (keys.length < 2) { container.innerHTML = ''; return; }
        let html = '<hr style="border:0; border-top:1px dashed #ddd; margin:20px 0;"><p style="text-align:center;font-weight:bold;margin-top:0;">'+(currentLang==='ko'?'시제 출제 확률 설정 :':'Réglez les probabilités :')+'</p>';
        keys.forEach(k => {
            let dispName = currentLang === 'ko' ? tenseMap[k].ko : k;
            html += `
            <div style="margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; font-size:0.95rem; font-weight:bold; margin-bottom:5px; color:var(--dark);">
                    <span>${dispName}</span>
                    <span id="val-${k.replace(/\s/g,'')}">${customWeights[k]}%</span>
                </div>
                <input type="range" min="0" max="100" value="${customWeights[k]}" oninput="window.updateCustomWeight('${k}', this.value)" style="width:100%;">
            </div>`;
        });
        container.innerHTML = html;
    };

    window.updateCustomWeight = function(changedTense, newValue) {
        newValue = parseInt(newValue);
        let others = Object.keys(customWeights).filter(k => k !== changedTense);
        let oldSumOthers = others.reduce((a,b) => a + customWeights[b], 0);
        customWeights[changedTense] = newValue;
        let targetSumOthers = 100 - newValue;
        if (others.length > 0) {
            if (oldSumOthers === 0) {
                let share = targetSumOthers / others.length;
                others.forEach(k => customWeights[k] = share);
            } else {
                others.forEach(k => { customWeights[k] = (customWeights[k] / oldSumOthers) * targetSumOthers; });
            }
        }
        let finalWeights = {}; let currentTotal = 0;
        Object.keys(customWeights).forEach(k => {
            finalWeights[k] = Math.round(customWeights[k]); currentTotal += finalWeights[k];
        });
        let diff = 100 - currentTotal;
        if (diff !== 0 && others.length > 0) { finalWeights[others[0]] += diff; }
        customWeights = finalWeights;
        Object.keys(customWeights).forEach(k => {
            let safeKey = k.replace(/\s/g,'');
            let slider = document.querySelector(`input[oninput*="'${k}'"]`);
            let label = document.getElementById(`val-${safeKey}`);
            if (slider && label) { slider.value = customWeights[k]; label.innerText = customWeights[k] + '%'; }
        });
    };

    window.confirmCustomTenses = function() {
        selectedTenses = Object.keys(customWeights);
        if (selectedTenses.length === 0) {
            alert(currentLang === 'ko' ? "최소 하나의 시제를 선택해주세요." : "Veuillez choisir au moins un temps."); return;
        }
        window.goToStep('step-quantity');
    };

    // --- CONJUGUEUR ---
    window.updateSuggestions = function() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        const suggBox = document.getElementById('suggestions');
        const resultsBox = document.getElementById('conj-results');
        if (query.length < 1) { suggBox.style.display = 'none'; resultsBox.innerHTML = ''; return; }
        let matches = fullDatabase.filter(v => v.verbe.toLowerCase().startsWith(query)).slice(0, 5);
        suggBox.innerHTML = '';
        if (matches.length > 0) {
            suggBox.style.display = 'block';
            matches.forEach(v => {
                let div = document.createElement('div');
                div.style.padding = "10px"; div.style.cursor = "pointer"; div.style.borderBottom = "1px solid #eee";
                div.innerText = v.verbe + (v.traduction ? ` (${v.traduction})` : "");
                div.onclick = () => {
                    document.getElementById('search-input').value = v.verbe;
                    suggBox.style.display = 'none';
                    window.showConjugation(v);
                };
                suggBox.appendChild(div);
            });
        } else { suggBox.style.display = 'none'; }
    };

    window.showConjugation = function(v) {
        const resultsBox = document.getElementById('conj-results');
        let html = `<h2>${v.verbe.toUpperCase()}</h2>`;
        if(v.traduction) html += `<p style="text-align:center; margin-top:-10px; color:#7f8c8d;">${v.traduction}</p>`;
        Object.keys(v.conjugaisons).forEach(tense => {
            html += `<div class="review-block"><h3>${currentLang === 'ko' ? tenseMap[tense].ko : tense}</h3><table class="review-table">`;
            v.conjugaisons[tense].forEach((conj, idx) => {
                if(conj !== "") html += `<tr><td style="font-weight:bold; color:var(--primary); width:40%;">${window.getPronoun(idx, conj, tense)}</td><td>${conj}</td></tr>`;
            });
            html += `</table></div>`;
        });
        resultsBox.innerHTML = html;
    };

    window.insertChar = function(char) {
        const input = document.getElementById('answer-input');
        input.value += char; input.focus();
    };

    fetch('verbes.json').then(res => res.json()).then(data => { fullDatabase = data; });
    document.addEventListener('keypress', (e) => { if(e.key === 'Enter' && document.querySelector('.step.active').id === 'step-game') window.checkAnswer(); });
</script>
</body>
