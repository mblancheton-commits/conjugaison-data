<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: var(--dark); }
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; }
        #verb-name { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        .custom-tenses { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; text-align: left; }
        .custom-tenses label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; }
        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 0 #ccc; }
        .btn-check { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .feedback { margin-top: 15px; text-align: center; font-weight: bold; min-height: 40px; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="setup-section">
        <label><b>Niveau DELF :</b></label>
        <select id="level-select" onchange="window.toggleCustomTenses()">
            <option value="A1">A1 (Débutant)</option>
            <option value="A2">A2 (Élémentaire)</option>
            <option value="B1">B1 (Intermédiaire)</option>
            <option value="B2">B2 (Avancé)</option>
            <option value="CUSTOM">Personnalisé...</option>
        </select>

        <div id="custom-box" class="custom-tenses">
            <label><input type="checkbox" class="tense-opt" value="Présent"> Présent</label>
            <label><input type="checkbox" class="tense-opt" value="Imparfait"> Imparfait</label>
            <label><input type="checkbox" class="tense-opt" value="Passé composé"> Passé composé</label>
            <label><input type="checkbox" class="tense-opt" value="Futur simple"> Futur simple</label>
            <label><input type="checkbox" class="tense-opt" value="Conditionnel présent"> Conditionnel</label>
            <label><input type="checkbox" class="tense-opt" value="Subjonctif présent"> Subjonctif</label>
            <label><input type="checkbox" class="tense-opt" value="Plus-que-parfait"> Plus-que-parfait</label>
            <label><input type="checkbox" class="tense-opt" value="Impératif présent"> Impératif</label>
        </div>
        <button onclick="window.initJeu()" style="margin-top:15px; width:100%; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ccc; background:#eee; font-weight:bold;">Appliquer / Nouveau Verbe</button>
    </div>

    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Total: <span id="total">0</span></span>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name" style="font-style:italic; color:#666; font-size: 0.9rem;">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" spellcheck="false">
        
        <div class="keyboard">
            <button class="key" onclick="window.insertChar('é')">é</button>
            <button class="key" onclick="window.insertChar('è')">è</button>
            <button class="key" onclick="window.insertChar('à')">à</button>
            <button class="key" onclick="window.insertChar('ç')">ç</button>
            <button class="key" onclick="window.insertChar('ê')">ê</button>
            <button class="key" onclick="window.insertChar('î')">î</button>
        </div>
    </div>

    <button id="btn-submit" class="btn-check" onclick="window.checkAnswer()">Vérifier</button>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    let fullDatabase = [];
    let currentV, currentTense, currentPIdx;
    let score = 0, total = 0;
    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];
    const levelsOrder = ["A1", "A2", "B1", "B2"];

    window.toggleCustomTenses = function() {
        const select = document.getElementById('level-select');
        document.getElementById('custom-box').style.display = (select.value === "CUSTOM") ? "grid" : "none";
    };

    window.insertChar = function(char) {
        const input = document.getElementById('answer-input');
        const start = input.selectionStart;
        input.value = input.value.slice(0, start) + char + input.value.slice(input.selectionEnd);
        input.focus();
        input.setSelectionRange(start + 1, start + 1);
    };

    window.initJeu = function() {
        if (fullDatabase.length === 0) return;

        const selectedLevel = document.getElementById('level-select').value;
        let allowedTenses = [];
        
        // 1. Définir les temps autorisés par niveau
        if (selectedLevel === "A1") allowedTenses = ["Présent"];
        else if (selectedLevel === "A2") allowedTenses = ["Présent", "Imparfait", "Passé composé", "Futur simple", "Conditionnel présent", "Impératif présent"];
        else if (selectedLevel === "B1") allowedTenses = ["Présent", "Imparfait", "Passé composé", "Plus-que-parfait", "Futur simple", "Conditionnel présent", "Subjonctif présent"];
        else if (selectedLevel === "B2") allowedTenses = ["Présent", "Imparfait", "Passé composé", "Plus-que-parfait", "Futur simple", "Conditionnel présent", "Subjonctif présent"];
        else if (selectedLevel === "CUSTOM") allowedTenses = Array.from(document.querySelectorAll('.tense-opt:checked')).map(cb => cb.value);

        // 2. Filtrer les verbes (CUMULATIF : B1 inclut les verbes A1 et A2)
        let filteredVerbs;
        if (selectedLevel === "CUSTOM") {
            filteredVerbs = fullDatabase;
        } else {
            const maxIdx = levelsOrder.indexOf(selectedLevel);
            filteredVerbs = fullDatabase.filter(v => levelsOrder.indexOf(v.niveau) <= maxIdx);
        }

        // 3. Tirage au sort
        let valid = false;
        let attempts = 0;
        while(!valid && attempts < 200) {
            attempts++;
            let tempV = filteredVerbs[Math.floor(Math.random() * filteredVerbs.length)];
            // On ne garde que les temps du verbe qui sont autorisés pour le niveau choisi
            let possibleTenses = Object.keys(tempV.conjugaisons).filter(t => allowedTenses.includes(t));
            
            if (possibleTenses.length > 0) {
                let tempTense = possibleTenses[Math.floor(Math.random() * possibleTenses.length)];
                
                // Restriction A2 Conditionnel
                if (selectedLevel === "A2" && tempTense === "Conditionnel présent") {
                    if (!["vouloir", "aimer", "pouvoir", "devoir"].includes(tempV.verbe)) continue;
                }

                currentV = tempV;
                currentTense = tempTense;
                valid = true;
            }
        }

        if (!valid) {
            document.getElementById('verb-name').innerText = "Aucun verbe trouvé";
            return;
        }

        // Tirage personne (en évitant les cases vides pour l'impératif)
        let pAttempts = 0;
        do {
            currentPIdx = Math.floor(Math.random() * 6);
            pAttempts++;
        } while (currentV.conjugaisons[currentTense][currentPIdx] === "" && pAttempts < 10);

        document.getElementById('answer-input').disabled = false;
        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').focus();
    };

    window.checkAnswer = function() {
        const inputField = document.getElementById('answer-input');
        if (inputField.disabled) return;
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const input = inputField.value.trim().toLowerCase();
        inputField.disabled = true;
        total++;
        if (input === solution) {
            score++;
            document.getElementById('feedback').innerHTML = "<span style='color:var(--secondary)'>✨ Bravo !</span>";
            setTimeout(window.initJeu, 1000);
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--error)'>❌ C'était : <b>${solution}</b></span>`;
            setTimeout(window.initJeu, 2500);
        }
        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = total;
    };

    fetch('verbes.json').then(res => res.json()).then(data => {
        fullDatabase = data;
        window.initJeu();
    });

    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.checkAnswer();
    });
</script>
</body>
</html>
