<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach DELF</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: var(--dark); }
        
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; }
        #verb-name { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        
        .custom-tenses {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            text-align: left;
        }
        .custom-tenses label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; }
        .custom-tenses input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }

        .keyboard { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .key { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 0 #ccc; }
        .key:active { transform: translateY(2px); box-shadow: none; }

        .btn-check { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .feedback { margin-top: 15px; text-align: center; font-weight: bold; min-height: 40px; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #ccc; background: white; font-size: 1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="setup-section">
        <label><b>Niveau DELF :</b></label>
        <select id="level-select" onchange="toggleCustomTenses()">
            <option value="A1">A1 (Débutant)</option>
            <option value="A2">A2 (Élémentaire)</option>
            <option value="B1">B1 (Intermédiaire)</option>
            <option value="B2">B2 (Avancé)</option>
            <option value="CUSTOM">Personnalisé...</option>
        </select>

        <div id="custom-box" class="custom-tenses">
            <label><input type="checkbox" class="tense-opt" value="Présent"> Présent</label>
            <label><input type="checkbox" class="tense-opt" value="Imparfait"> Imparfait</label>
            <label><input type="checkbox" class="tense-opt" value="Passé composé"> Passé composé</label>
            <label><input type="checkbox" class="tense-opt" value="Futur simple"> Futur simple</label>
            <label><input type="checkbox" class="tense-opt" value="Conditionnel présent"> Conditionnel</label>
            <label><input type="checkbox" class="tense-opt" value="Subjonctif présent"> Subjonctif</label>
            <label><input type="checkbox" class="tense-opt" value="Impératif présent"> Impératif</label>
        </div>
        <button onclick="initJeu()" style="margin-top:15px; width:100%; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ccc; background:#eee; font-weight:bold;">Appliquer / Nouveau Verbe</button>
    </div>

    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Total: <span id="total">0</span></span>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name" style="font-style:italic; color:#666; font-size: 0.9rem;">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off" spellcheck="false">
        
        <div class="keyboard">
            <button class="key" onclick="insertChar('é')">é</button>
            <button class="key" onclick="insertChar('è')">è</button>
            <button class="key" onclick="insertChar('à')">à</button>
            <button class="key" onclick="insertChar('ç')">ç</button>
            <button class="key" onclick="insertChar('ê')">ê</
