<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach Pro</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 95%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; }
        .header { text-align: center; margin-bottom: 20px; }
        .stats-bar { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 15px 0; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        .btn-check { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .feedback { margin-top: 20px; text-align: center; font-weight: bold; min-height: 40px; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Conju-Coach ✍️</h1>
        <div class="stats-bar">
            <span>Score: <b id="score">0</b></span>
            <span>Total: <b id="total">0</b></span>
        </div>
    </div>

    <div style="margin-bottom:20px; text-align:center;">
        <label>Groupe :</label>
        <select id="group-filter" onchange="initJeu()">
            <option value="all">Tous</option>
            <option value="1">1er groupe</option>
            <option value="2">2ème groupe</option>
            <option value="3">3ème groupe</option>
        </select>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name" style="font-style:italic; color:#666;">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Réponse..." autocomplete="off">
    </div>

    <button class="btn-check" onclick="checkAnswer()">Vérifier</button>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    // Configuration
    const urlBDD = "verbes.json"; 
    let fullDatabase = [];
    let currentV = {};
    let currentTense = "";
    let currentPIdx = 0;
    let score = 0;
    let total = 0;
    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];

    // Définition des fonctions sur l'objet window pour être sûr qu'elles soient globales
    window.initJeu = function() {
        const filter = document.getElementById('group-filter').value;
        let filteredList = (filter === "all") ? fullDatabase : fullDatabase.filter(v => v.groupe == filter);

        if (filteredList.length === 0) {
            document.getElementById('verb-name').innerText = "Aucun verbe";
            return;
        }

        currentV = filteredList[Math.floor(Math.random() * filteredList.length)];
        const tenses = Object.keys(currentV.conjugaisons);
        currentTense = tenses[Math.floor(Math.random() * tenses.length)];
        currentPIdx = Math.floor(Math.random() * 6);

        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').focus();
    };

    window.checkAnswer = function() {
        const input = document.getElementById('answer-input').value.trim().toLowerCase();
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const feedback = document.getElementById('feedback');

        total++;
        if (input === solution) {
            score++;
            feedback.style.color = "var(--secondary)";
            feedback.innerText = "✅ Bravo !";
            setTimeout(window.initJeu, 1000);
        } else {
            feedback.style.color = "var(--error)";
            feedback.innerHTML = `❌ Non : <b>${solution}</b>`;
        }
        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = total;
    };

    // Chargement initial
    fetch(urlBDD)
        .then(res => {
            if (!res.ok) throw new Error("Fichier verbes.json non trouvé");
            return res.json();
        })
        .then(data => {
            fullDatabase = data;
            window.initJeu();
        })
        .catch(err => {
            document.getElementById('verb-name').innerText = "Erreur BDD";
            document.getElementById('feedback').innerText = "Vérifiez que verbes.json est bien présent.";
            console.error(err);
        });

    // Touche Entrée
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.checkAnswer();
    });
</script>

</body>
</html>
