<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach Pro</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --dark: #2c3e50;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: white;
            width: 95%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 25px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--dark); margin: 0 0 15px 0; font-size: 1.5rem; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .filter-section {
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            margin-top: 5px;
        }

        .verb-card {
            background: #eef7ff;
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        #verb-name { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        #tense-name { color: #666; font-style: italic; margin-bottom: 10px; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 15px 0; color: var(--dark); }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-check { background: var(--secondary); color: white; }
        .btn-help { background: #95a5a6; color: white; }
        button:active { transform: scale(0.98); }

        .feedback {
            margin-top: 20px;
            min-height: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .help-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Conju-Coach ✍️</h1>
        <div class="stats-bar">
            <span>Score: <b id="score">0</b></span>
            <span>Total: <b id="total">0</b></span>
        </div>
    </div>

    <div class="filter-section">
        <label for="group-filter">Réviser quel groupe ?</label>
        <select id="group-filter" onchange="initJeu()">
            <option value="all">Tous les verbes</option>
            <option value="1">1er groupe (-er)</option>
            <option value="2">2ème groupe (-ir)</option>
            <option value="3">3ème groupe (irréguliers)</option>
        </select>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Tapez ici..." autocomplete="off" spellcheck="false">
    </div>

    <div class="button-group">
        <button class="btn-help" onclick="window.open(helpUrl, '_blank')">Aide</button>
        <button class="btn-check" onclick="checkAnswer()">Vérifier</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <a id="conjugueur-link" href="#" target="_blank" class="help-link">Voir sur Le Conjugueur</a>
</div>

<script>
    // Variables globales
    const urlBDD = "verbes.json"; 
    let fullDatabase = [];
    let currentV = {};
    let currentTense = "";
    let currentPIdx = 0;
    let score = 0;
    let total = 0;
    let helpUrl = "";
    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];

    // 1. Fonction pour initialiser une question
    function initJeu() {
        if (fullDatabase.length === 0) return;

        const filter = document.getElementById('group-filter').value;
        let filteredList = [];

        if (filter === "all") {
            filteredList = fullDatabase;
        } else {
            filteredList = fullDatabase.filter(v => v.groupe == filter);
        }

        if (filteredList.length === 0) {
            document.getElementById('verb-name').innerText = "Aucun verbe trouvé";
            return;
        }

        // Tirage au sort
        currentV = filteredList[Math.floor(Math.random() * filteredList.length)];
        const tempsDisponibles = Object.keys(currentV.conjugaisons);
        currentTense = tempsDisponibles[Math.floor(Math.random() * tempsDisponibles.length)];
        currentPIdx = Math.floor(Math.random() * 6);

        // Affichage
        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
        
        helpUrl = `https://leconjugueur.lefigaro.fr/php5/index.php?verbe=${currentV.verbe}`;
        document.getElementById('conjugueur-link').href = helpUrl;
        document.getElementById('answer-input').focus();
    }

    // 2. Fonction pour vérifier la réponse
    function checkAnswer() {
        const input = document.getElementById('answer-input').value.trim().toLowerCase();
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const feedback = document.getElementById('feedback');

        total++;
        if (input === solution) {
            score++;
            feedback.style.color = "var(--secondary)";
            feedback.innerText = "✅ Bravo !";
            setTimeout(initJeu, 1200);
        } else {
            feedback.style.color = "var(--error)";
            feedback.innerHTML = `❌ Non : <b>${solution}</b>`;
        }

        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = total;
    }

    // 3. Charger les données au démarrage
    fetch(urlBDD)
        .then(res => {
            if (!res.ok) throw new Error("Erreur 404 sur verbes.json");
            return res.json();
        })
        .then(data => {
            fullDatabase = data;
            initJeu();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('verb-name').innerText = "Erreur !";
            document.getElementById('feedback').innerText = "Fichier verbes.json introuvable.";
        });

    // Écouter la touche Entrée
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>

</body>
</html>
