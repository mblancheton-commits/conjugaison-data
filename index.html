<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conju-Coach Pro</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 95%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; }
        .header { text-align: center; margin-bottom: 15px; }
        .stats-bar { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
        .verb-card { background: #eef7ff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; }
        #verb-name { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; }
        #pronoun { font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: var(--dark); }
        
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; }
        input:disabled { background: #f9f9f9; color: #333; }

        /* Clavier d'accents */
        .keyboard { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .key { background: #fff; border: 1px solid #ddd; border-radius: 5px; padding: 10px; min-width: 40px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 0 #ccc; transition: 0.1s; }
        .key:active { transform: translateY(2px); box-shadow: none; }

        .btn-check { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
        .btn-check:disabled { background: #ccc; cursor: not-allowed; }

        .feedback { margin-top: 20px; text-align: center; font-weight: bold; min-height: 45px; font-size: 1.1rem; line-height: 1.4; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Conju-Coach ✍️</h1>
        <div class="stats-bar">
            <span>Score: <b id="score" style="color:var(--secondary)">0</b></span>
            <span>Total: <b id="total">0</b></span>
        </div>
    </div>

    <div style="margin-bottom:15px; text-align:center; font-size: 0.9rem;">
        <label>Filtrer par groupe :</label>
        <select id="group-filter" onchange="initJeu()">
            <option value="all">Tous les verbes</option>
            <option value="1">1er groupe (-er)</option>
            <option value="2">2ème groupe (-ir)</option>
            <option value="3">3ème groupe (irréguliers)</option>
        </select>
    </div>

    <div class="verb-card">
        <div id="verb-name">Chargement...</div>
        <div id="tense-name" style="font-style:italic; color:#666; font-size: 0.9rem;">-</div>
        <div id="pronoun">---</div>
        <input type="text" id="answer-input" placeholder="Tapez la réponse..." autocomplete="off" spellcheck="false">
        
        <!-- Boutons d'accents -->
        <div class="keyboard">
            <button class="key" onclick="insertChar('é')">é</button>
            <button class="key" onclick="insertChar('è')">è</button>
            <button class="key" onclick="insertChar('à')">à</button>
            <button class="key" onclick="insertChar('ç')">ç</button>
            <button class="key" onclick="insertChar('ê')">ê</button>
            <button class="key" onclick="insertChar('î')">î</button>
        </div>
    </div>

    <button id="btn-submit" class="btn-check" onclick="checkAnswer()">Vérifier</button>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const urlBDD = "verbes.json"; 
    let fullDatabase = [];
    let currentV, currentTense, currentPIdx;
    let score = 0, total = 0;
    const pronoms = ["Je", "Tu", "Il / Elle", "Nous", "Vous", "Ils / Elles"];

    // Insertion d'accent
    window.insertChar = function(char) {
        const input = document.getElementById('answer-input');
        if (input.disabled) return;
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const text = input.value;
        input.value = text.slice(0, start) + char + text.slice(end);
        input.focus();
        input.setSelectionRange(start + 1, start + 1);
    };

    window.initJeu = function() {
        const filter = document.getElementById('group-filter').value;
        let filteredList = (filter === "all") ? fullDatabase : fullDatabase.filter(v => v.groupe == filter);

        if (filteredList.length === 0) {
            document.getElementById('verb-name').innerText = "Aucun verbe";
            return;
        }

        // Réactivation des champs
        document.getElementById('answer-input').disabled = false;
        document.getElementById('btn-submit').disabled = false;

        currentV = filteredList[Math.floor(Math.random() * filteredList.length)];
        const tenses = Object.keys(currentV.conjugaisons);
        currentTense = tenses[Math.floor(Math.random() * tenses.length)];
        currentPIdx = Math.floor(Math.random() * 6);

        document.getElementById('verb-name').innerText = currentV.verbe;
        document.getElementById('tense-name').innerText = currentTense;
        document.getElementById('pronoun').innerText = pronoms[currentPIdx] + " ...";
        document.getElementById('answer-input').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').focus();
    };

    window.checkAnswer = function() {
        const inputField = document.getElementById('answer-input');
        const submitBtn = document.getElementById('btn-submit');
        const input = inputField.value.trim().toLowerCase();
        const solution = currentV.conjugaisons[currentTense][currentPIdx].toLowerCase();
        const feedback = document.getElementById('feedback');

        // On bloque les entrées pendant la correction
        inputField.disabled = true;
        submitBtn.disabled = true;

        total++;
        if (input === solution) {
            score++;
            feedback.style.color = "var(--secondary)";
            feedback.innerText = "✨ Bravo ! Correct.";
            setTimeout(window.initJeu, 1000); // Passe après 1 seconde
        } else {
            feedback.style.color = "var(--error)";
            feedback.innerHTML = `❌ Erreur.<br>C'était : <span style="font-size:1.3rem">${solution}</span>`;
            setTimeout(window.initJeu, 2500); // Laisse 2.5s pour lire la correction
        }
        
        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = total;
    };

    fetch(urlBDD)
        .then(res => res.json())
        .then(data => {
            fullDatabase = data;
            window.initJeu();
        })
        .catch(err => {
            document.getElementById('verb-name').innerText = "Erreur !";
            document.getElementById('feedback').innerText = "Le fichier verbes.json est introuvable.";
        });

    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('answer-input').disabled) window.checkAnswer();
    });
</script>

</body>
</html>
